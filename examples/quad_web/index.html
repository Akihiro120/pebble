<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pebble — Web Example</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Prevents accidental mobile pull-to-refresh or bounce scrolling */
            overscroll-behavior: none; 
        }

        canvas {
            display: block;
            /* Scale smoothly up to the boundaries of the screen */
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            /* Keeps the 16:9 aspect ratio intact dynamically */
            aspect-ratio: 16 / 9; 
            
            border: 1px solid #333;
            background: #000;
            
            /* Keeps pixels sharp when scaled up */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #status {
            position: fixed;
            top: 12px;
            left: 12px;
            font-family: system-ui, -apple-system, monospace;
            font-size: 13px;
            letter-spacing: 0.5px;
            color: #8f8;
            background: rgba(0, 0, 0, 0.75);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #222;
            pointer-events: none; /* Stops it from blocking clicks */
            transition: opacity 0.3s ease;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">Loading WASM…</div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        const status = document.getElementById("status");
        const canvas = document.getElementById("canvas");

        // Set the internal resolution (render buffer) to 1280x720 
        // while CSS handles how large it looks on screen.
        canvas.width = 1280;
        canvas.height = 720;

        import init from "./pkg/quad_web.js";

        init()
            .then(() => {
                status.textContent = "Running";
                // Smoothly fade out the status rather than an abrupt disappear
                setTimeout(() => {
                    status.style.opacity = "0";
                    setTimeout(() => status.remove(), 300);
                }, 1000);
            })
            .catch((err) => {
                status.textContent = "Error — see console";
                status.style.color = "#f88";
                status.style.borderColor = "#522";
                console.error(err);
            });
    </script>
</body>
</html>
